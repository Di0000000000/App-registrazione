<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registratore Vocale Continuo</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: #ffffff; height: 100vh; display: flex;
            justify-content: center; align-items: center; overflow: hidden;
        }
        .container {
            text-align: center; display: flex; flex-direction: column;
            justify-content: center; align-items: center; width: 100%; max-width: 400px; padding: 20px;
        }
        .language-selector { margin-bottom: 25px; font-size: 14px; color: #555; }
        .language-selector select {
            padding: 6px 12px; border-radius: 8px; border: 2px solid #00a2ff;
            background-color: white; color: #00a2ff; font-weight: bold; outline: none; cursor: pointer;
        }
        .record-btn {
            width: 140px; height: 140px; border-radius: 50%; background-color: #ffffff;
            border: 4px solid #00a2ff; color: #00a2ff; font-size: 50px; cursor: pointer;
            display: flex; justify-content: center; align-items: center; outline: none;
            transition: all 0.3s ease; box-shadow: 0 6px 20px rgba(0, 162, 255, 0.15);
        }
        .record-btn.recording { background-color: #00a2ff; color: #ffffff; animation: pulse 1.5s infinite; }
        #status { margin-top: 20px; font-size: 16px; color: #777777; font-weight: 500; }
        @keyframes pulse {
            0% { box-shadow: 0 0 0 0 rgba(0, 162, 255, 0.4); }
            70% { box-shadow: 0 0 0 20px rgba(0, 162, 255, 0); }
            100% { box-shadow: 0 0 0 0 rgba(0, 162, 255, 0); }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="language-selector">
            <label for="langSelect">Lingua: </label>
            <select id="langSelect">
                <option value="auto">Rileva Automaticamente ✨</option>
                <option value="it">Italiano 🇮🇹</option>
                <option value="en">Inglese 🇬🇧</option>
            </select>
        </div>
        <button id="recordBtn" class="record-btn"><i class="fa-solid fa-microphone"></i></button>
        <p id="status">Tocca per avviare la sessione di ore</p>
    </div>

    <script>
        const recordBtn = document.getElementById('recordBtn');
        const statusText = document.getElementById('status');
        const langSelect = document.getElementById('langSelect');
        let mediaRecorder;
        let isRecording = false;
        let chunkInterval;

        recordBtn.addEventListener('click', async () => {
            if (!isRecording) {
                try {
                    const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
                    // Registriamo in blocchi temporizzati
                    mediaRecorder = new MediaRecorder(stream);
                    
                    mediaRecorder.ondataavailable = async (event) => {
                        if (event.data.size > 0) {
                            const audioBlob = new Blob([event.data], { type: 'audio/wav' });
                            const formData = new FormData();
                            formData.append('audio', audioBlob);
                            formData.append('lang', langSelect.value);

                            // Spedisce il blocco di 1 minuto in background
                            fetch('/upload_audio', { method: 'POST', body: formData })
                            .then(res => res.json())
                            .then(data => { console.log("Blocco inviato con successo"); })
                            .catch(err => { console.error("Errore invio blocco", err); });
                        }
                    };

                    // Avvia la registrazione e chiedi al browser di sfornare dati ogni 60000 millisecondi (1 minuto)
                    mediaRecorder.start(60000);
                    
                    isRecording = true;
                    recordBtn.classList.add('recording');
                    statusText.innerText = "Registrazione continua attiva... Scrittura sul Doc ogni minuto.";
                } catch (err) {
                    alert("Permesso microfono richiesto!");
                }
            } else {
                // Ferma tutto
                mediaRecorder.stop();
                mediaRecorder.stream.getTracks().forEach(track => track.stop());
                isRecording = false;
                recordBtn.classList.remove('recording');
                statusText.innerText = "Sessione terminata. Ultimi blocchi in scrittura...";
                setTimeout(() => { statusText.innerText = "Tocca per avviare la sessione di ore"; }, 4000);
            }
        });
    </script>
</body>
</html>
