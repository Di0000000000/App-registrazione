<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registratore Vocale</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: #ffffff;
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }

        .container {
            text-align: center;
        }

        /* Il grande bottone tondo */
        .record-btn {
            width: 140px;
            height: 140px;
            border-radius: 50%;
            background-color: #ffffff;
            border: 4px solid #00a2ff;
            color: #00a2ff;
            font-size: 50px;
            cursor: pointer;
            display: flex;
            justify-content: center;
            align-items: center;
            outline: none;
            transition: all 0.3s ease;
            box-shadow: 0 6px 20px rgba(0, 162, 255, 0.15);
        }

        /* Effetto quando ci passi sopra o lo clicchi */
        .record-btn:active {
            transform: scale(0.95);
        }

        /* Stato durante la registrazione: diventa azzurro con icona bianca */
        .record-btn.recording {
            background-color: #00a2ff;
            color: #ffffff;
            box-shadow: 0 0 30px rgba(0, 162, 255, 0.5);
            animation: pulse 1.5s infinite;
        }

        /* Scritta di stato sotto il bottone */
        #status {
            margin-top: 25px;
            font-size: 18px;
            color: #555555;
            font-weight: 500;
        }

        /* Animazione di pulsazione soft mentre registra */
        @keyframes pulse {
            0% { box-shadow: 0 0 0 0 rgba(0, 162, 255, 0.4); }
            70% { box-shadow: 0 0 0 20px rgba(0, 162, 255, 0); }
            100% { box-shadow: 0 0 0 0 rgba(0, 162, 255, 0); }
        }
    </style>
</head>
<body>

    <div class="container">
        <button id="recordBtn" class="record-btn">
            <i class="fa-solid fa-microphone"></i>
        </button>
        <p id="status">Tocca per registrare</p>
    </div>

    <script>
        const recordBtn = document.getElementById('recordBtn');
        const statusText = document.getElementById('status');
        let mediaRecorder;
        let audioChunks = [];
        let isRecording = false;

        recordBtn.addEventListener('click', async () => {
            if (!isRecording) {
                // Avvia registrazione
                try {
                    const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
                    mediaRecorder = new MediaRecorder(stream);
                    audioChunks = [];

                    mediaRecorder.ondataavailable = event => {
                        audioChunks.push(event.data);
                    };

                    mediaRecorder.onstop = async () => {
                        const audioBlob = new Blob(audioChunks, { type: 'audio/wav' });
                        statusText.innerText = "Trascrizione in corso...";
                        
                        // Invia l'audio al server di Render
                        const formData = new FormData();
                        formData.append('audio', audioBlob);

                        try {
                            const response = await fetch('/upload_audio', {
                                method: 'POST',
                                body: formData
                            });
                            const result = await response.json();
                            if (result.success) {
                                statusText.innerText = "Trascritto nel Google Doc!";
                            } else {
                                statusText.innerText = "Errore durante l'invio.";
                            }
                        } catch (err) {
                            statusText.innerText = "Errore di connessione.";
                        }

                        // Ripristina la grafica dopo un po'
                        setTimeout(() => {
                            statusText.innerText = "Tocca per registrare";
                        }, 4000);
                    };

                    mediaRecorder.start();
                    isRecording = true;
                    recordBtn.classList.add('recording');
                    statusText.innerText = "Registrazione in corso... (Tocca per fermare)";

                } catch (err) {
                    alert("Devi dare i permessi al microfono per usare l'app!");
                    statusText.innerText = "Permesso microfono negato.";
                }
            } else {
                // Ferma registrazione
                mediaRecorder.stop();
                mediaRecorder.stream.getTracks().forEach(track => track.stop());
                isRecording = false;
                recordBtn.classList.remove('recording');
            }
        });
    </script>

</body>
</html>
