<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Test Diagnostico Registratore</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: #ffffff; height: 100vh; display: flex;
            justify-content: center; align-items: center; overflow: hidden;
        }
        .container {
            text-align: center; display: flex; flex-direction: column;
            justify-content: center; align-items: center; width: 100%; max-width: 400px; padding: 20px;
        }
        .language-selector { margin-bottom: 25px; font-size: 14px; color: #555; }
        .language-selector select {
            padding: 6px 12px; border-radius: 8px; border: 2px solid #00a2ff;
            background-color: white; color: #00a2ff; font-weight: bold; outline: none; cursor: pointer;
        }
        .record-btn {
            width: 140px; height: 140px; border-radius: 50%; background-color: #ffffff;
            border: 4px solid #00a2ff; color: #00a2ff; font-size: 50px; cursor: pointer;
            display: flex; justify-content: center; align-items: center; outline: none;
            transition: all 0.3s ease; box-shadow: 0 6px 20px rgba(0, 162, 255, 0.15);
        }
        .record-btn.recording { background-color: #00a2ff; color: #ffffff; animation: pulse 1.5s infinite; }
        #status { margin-top: 20px; font-size: 16px; color: #333; font-weight: 500; background: #f0f0f0; padding: 10px; border-radius: 8px; width: 100%; }
    </style>
</head>
<body>
    <div class="container">
        <div class="language-selector">
            <label for="langSelect">Lingua: </label>
            <select id="langSelect">
                <option value="it">Italiano 🇮🇹</option>
                <option value="en">Inglese 🇬🇧</option>
            </select>
        </div>
        <button id="recordBtn" class="record-btn"><i class="fa-solid fa-microphone"></i></button>
        <p id="status">Stato: Pronto. Clicca il microfono.</p>
    </div>

    <script>
        const recordBtn = document.getElementById('recordBtn');
        const statusText = document.getElementById('status');
        const langSelect = document.getElementById('langSelect');
        let mediaRecorder;
        let isRecording = false;

        // Controlla subito se il browser blocca il microfono per colpa di HTTP/HTTPS
        if (!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia) {
            statusText.innerHTML = "<span style='color:red;'>⚠️ ERRORE SICUREZZA: Il browser blocca il microfono. Assicurati che l'indirizzo del sito inizi con HTTPS:// e non con HTTP://</span>";
        }

        recordBtn.addEventListener('click', async () => {
            if (!isRecording) {
                statusText.innerText = "Stato: Richiesta accesso microfono...";
                try {
                    const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
                    statusText.innerText = "Stato: Microfono attivo! Configurazione formato...";
                    
                    let options = { mimeType: 'audio/webm;codecs=opus' };
                    if (!MediaRecorder.isTypeSupported(options.mimeType)) { options = { mimeType: 'audio/mp4' }; }
                    if (!MediaRecorder.isTypeSupported(options.mimeType)) { options = {}; }
                    
                    mediaRecorder = new MediaRecorder(stream, options);
                    statusText.innerText = "Stato: Registratore pronto. Avvio flusso...";

                    mediaRecorder.ondataavailable = async (event) => {
                        statusText.innerText = "Stato: Frammento audio catturato! Preparazione invio...";
                        if (event.data && event.data.size > 0) {
                            const formData = new FormData();
                            const extension = mediaRecorder.mimeType.includes('mp4') ? 'mp4' : 'webm';
                            formData.append('audio', event.data, `chunk.${extension}`);
                            formData.append('lang', langSelect.value);

                            statusText.innerText = "Stato: Invio audio a Render in corso...";

                            fetch('/upload_audio', { method: 'POST', body: formData })
                            .then(res => res.json())
                            .then(data => { 
                                if(data.success) {
                                    statusText.innerHTML = "Stato: <span style='color:green;'>Dati inviati con successo a Render! 🟢</span>";
                                } else {
                                    statusText.innerHTML = "Stato: <span style='color:red;'>Errore interno di Render (" + data.error + ") 🔴</span>";
                                }
                            })
                            .catch(err => { 
                                statusText.innerHTML = "Stato: <span style='color:red;'>Errore di rete. Render non raggiungibile. 🔴</span>"; 
                            });
                        } else {
                            statusText.innerText = "Stato: Frammento vuoto catturato (0 bytes).";
                        }
                    };

                    // Sforna dati ogni 15 secondi (più veloce per il test)
                    mediaRecorder.start(15000);
                    
                    isRecording = true;
                    recordBtn.classList.add('recording');
                    statusText.innerText = "Stato: In ascolto... Primo invio tra 15 secondi.";
                } catch (err) {
                    statusText.innerHTML = "<span style='color:red;'>⚠️ Errore microfono: " + err.message + "</span>";
                }
            } else {
                mediaRecorder.stop();
                mediaRecorder.stream.getTracks().forEach(track => track.stop());
                isRecording = false;
                recordBtn.classList.remove('recording');
                statusText.innerText = "Stato: Sessione fermata manualmente.";
            }
        });
    </script>
</body>
</html>
