<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registratore Vocale</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: #ffffff;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
        }

        /* Contenitore principale bloccato al centro dello schermo */
        .container {
            text-align: center;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            width: 100%;
            max-width: 400px;
            padding: 20px;
        }

        /* Menu selezione lingua */
        .language-selector { 
            margin-bottom: 25px; 
            font-size: 14px; 
            color: #555; 
        }
        .language-selector select {
            padding: 6px 12px;
            border-radius: 8px;
            border: 2px solid #00a2ff;
            background-color: white;
            color: #00a2ff;
            font-weight: bold;
            outline: none;
            cursor: pointer;
        }

        /* Il grande bottone tondo */
        .record-btn {
            width: 140px;
            height: 140px;
            border-radius: 50%;
            background-color: #ffffff;
            border: 4px solid #00a2ff;
            color: #00a2ff;
            font-size: 50px;
            cursor: pointer;
            display: flex;
            justify-content: center;
            align-items: center;
            outline: none;
            transition: all 0.3s ease;
            box-shadow: 0 6px 20px rgba(0, 162, 255, 0.15);
        }

        /* Effetto al click */
        .record-btn:active {
            transform: scale(0.95);
        }

        /* Stato durante la registrazione */
        .record-btn.recording {
            background-color: #00a2ff;
            color: #ffffff;
            box-shadow: 0 0 30px rgba(0, 162, 255, 0.5);
            animation: pulse 1.5s infinite;
        }

        /* Scritta di stato sotto il bottone */
        #status {
            margin-top: 25px;
            font-size: 18px;
            color: #555555;
            font-weight: 500;
        }

        /* Box per l'anteprima del testo che scorre sotto */
        .preview-box {
            margin-top: 25px;
            width: 100%;
            max-height: 150px;
            min-height: 80px;
            overflow-y: auto;
            padding: 15px;
            border-radius: 12px;
            background-color: #f4f9ff;
            border: 1px dashed #00a2ff;
            color: #333333;
            font-size: 15px;
            line-height: 1.4;
            text-align: left;
            display: none; /* Appare solo quando si registra */
        }

        /* Animazione di pulsazione soft mentre registra */
        @keyframes pulse {
            0% { box-shadow: 0 0 0 0 rgba(0, 162, 255, 0.4); }
            70% { box-shadow: 0 0 0 20px rgba(0, 162, 255, 0); }
            100% { box-shadow: 0 0 0 0 rgba(0, 162, 255, 0); }
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="language-selector">
            <label for="langSelect">Lingua: </label>
            <select id="langSelect">
                <option value="auto">Rileva Automaticamente ✨</option>
                <option value="it">Italiano 🇮🇹</option>
                <option value="en">Inglese 🇬🇧</option>
            </select>
        </div>

        <button id="recordBtn" class="record-btn">
            <i class="fa-solid fa-microphone"></i>
        </button>
        <p id="status">Tocca per registrare</p>

        <div id="previewBox" class="preview-box"></div>
    </div>

    <script>
        const recordBtn = document.getElementById('recordBtn');
        const statusText = document.getElementById('status');
        const previewBox = document.getElementById('previewBox');
        const langSelect = document.getElementById('langSelect');
        
        let mediaRecorder;
        let audioChunks = [];
        let isRecording = false;
        let recognition;

        // Funzione per attivare il testo sullo schermo in tempo reale
        function startSpeechRecognition() {
            if ('webkitSpeechRecognition' in window || 'SpeechRecognition' in window) {
                const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
                recognition = new SpeechRecognition();
                recognition.continuous = true;
                recognition.interimResults = true;
                
                // Configura la lingua per l'anteprima dello schermo
                recognition.lang = langSelect.value === 'en' ? 'en-US' : 'it-IT';

                recognition.onresult = (event) => {
                    let interimTranscript = '';
                    for (let i = event.resultIndex; i < event.results.length; ++i) {
                        interimTranscript += event.results[i][0].transcript;
                    }
                    previewBox.innerText = interimTranscript;
                    previewBox.scrollTop = previewBox.scrollHeight;
                };
            }
        }

        recordBtn.addEventListener('click', async () => {
            if (!isRecording) {
                // Avvia registrazione
                try {
                    const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
                    mediaRecorder = new MediaRecorder(stream);
                    audioChunks = [];

                    mediaRecorder.ondataavailable = event => {
                        audioChunks.push(event.data);
                    };

                    mediaRecorder.onstop = async () => {
                        const audioBlob = new Blob(audioChunks, { type: 'audio/wav' });
                        statusText.innerText = "Trascrizione in corso...";
                        previewBox.innerText = "Inoltro dell'audio ufficiale all'IA...";
                        
                        // Invia l'audio e la lingua selezionata al server
                        const formData = new FormData();
                        formData.append('audio', audioBlob);
                        formData.append('lang', langSelect.value);

                        try {
                            const response = await fetch('/upload_audio', {
                                method: 'POST',
                                body: formData
                            });
                            const result = await response.json();
                            if (result.success) {
                                statusText.innerText = "Trascritto nel Google Doc! 🎉";
                                previewBox.innerText = "Fatto! Testo inviato correttamente.";
                            } else {
                                statusText.innerText = "Errore durante l'invio.";
                            }
                        } catch (err) {
                            statusText.innerText = "Errore di connessione.";
                        }

                        // Ripristina la grafica dopo 4 secondi
                        setTimeout(() => {
                            statusText.innerText = "Tocca per registrare";
                            previewBox.style.display = 'none';
                            previewBox.innerText = '';
                        }, 4000);
                    };

                    mediaRecorder.start();
                    
                    // Avvia lo scorrimento del testo
                    startSpeechRecognition();
                    if (recognition) {
                        previewBox.innerText = "Ascolto in corso...";
                        previewBox.style.display = 'block';
                        recognition.start();
                    }

                    isRecording = true;
                    recordBtn.classList.add('recording');
                    statusText.innerText = "Registrazione in corso... (Tocca per fermare)";

                } catch (err) {
                    alert("Devi dare i permessi al microfono per usare l'app!");
                    statusText.innerText = "Permesso microfono negato.";
                }
            } else {
                // Ferma registrazione
                mediaRecorder.stop();
                mediaRecorder.stream.getTracks().forEach(track => track.stop());
                if (recognition) {
                    recognition.stop();
                }
                isRecording = false;
                recordBtn.classList.remove('recording');
            }
        });
    </script>

</body>
</html>
</html>
